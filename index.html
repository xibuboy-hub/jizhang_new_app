<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>记账小助手</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>记账小助手</h1>
      </header>

      <section class="left">
        <h2>新增 / 编辑 记录</h2>
        <form id="tx-form">
          <div class="row">
            <label>类型</label>
            <label><input type="radio" name="type" value="income" checked /> 收入</label>
            <label><input type="radio" name="type" value="expense" /> 支出</label>
          </div>

          <div class="row">
            <label>金额</label>
            <input type="number" step="0.01" id="amount" required />
          </div>

          <div class="row">
            <label>日期</label>
            <input type="date" id="date" required />
          </div>

          <div class="row">
            <label>一级分类</label>
            <select id="primary-category"></select>
            <input type="text" id="new-primary" placeholder="新一级分类（可选）" />
          </div>

          <div class="row">
            <label>二级分类</label>
            <select id="secondary-category"></select>
            <input type="text" id="new-secondary" placeholder="新二级分类（可选）" />
          </div>

          <div class="row">
            <label>备注</label>
            <textarea id="notes"></textarea>
          </div>

          <div class="row">
            <button type="submit" id="save-btn">保存</button>
            <button type="button" id="cancel-edit" style="display:none;background:#888;">取消编辑</button>
            <button type="button" id="export-btn">导出 CSV</button>
          </div>
        </form>
      </section>

      <section class="right">
        <h2>记录列表</h2>

        <!-- 筛选区域 -->
        <div class="filters">
          <div class="filter-row">
            <label>类型</label>
            <select id="filter-type">
              <option value="all">全部</option>
              <option value="income">收入</option>
              <option value="expense">支出</option>
            </select>

            <label>从</label>
            <input type="date" id="filter-from" />

            <label>到</label>
            <input type="date" id="filter-to" />
          </div>

          <div class="filter-row">
            <label>一级分类</label>
            <select id="filter-primary"></select>

            <label>二级分类</label>
            <select id="filter-secondary"></select>

            <button id="filter-apply">应用</button>
            <button id="filter-reset">重置</button>
          </div>
        </div>

        <!-- 汇总预览 -->
        <div class="preview" id="preview-area">
          <div>筛选结果: <span id="preview-count">0</span> 条</div>
          <div>收入: <span id="preview-income">0</span></div>
          <div>支出: <span id="preview-expense">0</span></div>
          <div>结余: <span id="preview-balance">0</span></div>
        </div>

        <div id="tx-list"></div>
      </section>
    </div>

    <!-- 历史模态框 -->
    <div id="history-modal" class="modal" style="display:none;">
      <div class="modal-content">
        <div class="modal-header">
          <h3>修改历史</h3>
          <button id="history-close" class="modal-close">关闭</button>
        </div>
        <div class="modal-body" id="history-body"></div>
      </div>
    </div>
    <script src="renderer.js"></script>
  </body>
</html>
